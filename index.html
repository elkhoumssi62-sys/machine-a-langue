<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machine à Langue | Portail de M. Mohamed EL Khoumssi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a2a6c;
            --secondary: #b21f1f;
            --accent: #fdbb2d;
            --bg: #f4f7f6;
            --white: #ffffff;
            --text: #2c3e50;
            --fb-color: #1877F2;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; }

        /* HEADER & NAV */
        header {
            background: var(--primary); color: white; padding: 1rem 0;
            position: fixed; width: 100%; top: 0; z-index: 1000; display: none; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.2);
        }
        .nav-container { width: 90%; max-width: 1200px; margin: auto; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; text-decoration: none; margin-left: 20px; font-weight: 500; cursor: pointer; font-size: 0.85rem; text-transform: uppercase; transition: 0.3s; }
        nav a:hover { color: var(--accent); }
        .nav-active-btn { background: var(--secondary); padding: 5px 15px; border-radius: 20px; }

        /* HERO SECTION */
        #home {
            height: 100vh;
            background: linear-gradient(135deg, rgba(26, 42, 108, 0.9), rgba(178, 31, 31, 0.9)), 
                        url('https://images.unsplash.com/photo-1457369804613-52c61a468e7d?auto=format&fit=crop&w=1350&q=80');
            background-size: cover; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: white;
        }
        .hero-content h1 { font-size: 3.5rem; font-weight: 800; margin-bottom: 10px; letter-spacing: -1px; }
        .hero-content p { font-size: 1.2rem; opacity: 0.9; margin-bottom: 25px; }

        /* BOUTONS SOCIAUX SUR L'ACCUEIL */
        .hero-social-actions {
            display: flex; gap: 15px; margin-bottom: 35px; flex-wrap: wrap; justify-content: center;
        }
        .hero-btn {
            padding: 12px 28px; border-radius: 50px; text-decoration: none; 
            font-weight: 600; font-size: 0.95rem; transition: 0.3s; border: none; cursor: pointer;
        }
        .btn-fb { background: var(--fb-color); color: white; }
        .btn-cours { background: var(--accent); color: var(--primary); }
        .btn-msg { background: var(--white); color: var(--primary); }
        .hero-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }

        .main-menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; width: 90%; max-width: 1100px; }
        .menu-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; transition: 0.4s; }
        .menu-card:hover { background: var(--white); color: var(--primary); transform: translateY(-10px); }
        .menu-card i { font-size: 2.5rem; display: block; margin-bottom: 10px; }

        /* CONTENT SECTIONS */
        .content-section { display: none; padding: 120px 20px 60px; min-height: 100vh; }
        .active { display: block; }
        .container { max-width: 1000px; margin: auto; }
        .art-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        
        .art-card {
            background: white; padding: 25px; border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-top: 5px solid var(--secondary);
            cursor: pointer; transition: 0.3s; position: relative; overflow: hidden;
        }
        .art-card::after { content: 'Lire la leçon →'; position: absolute; bottom: 10px; right: 20px; font-size: 0.7rem; color: var(--secondary); font-weight: bold; opacity: 0.6; }
        .art-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .art-card h3 { color: var(--primary); font-size: 1.1rem; margin-bottom: 10px; }
        .art-card p { font-size: 0.85rem; color: #666; line-height: 1.5; }

        /* MODALE & QUIZ */
        .course-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 42, 108, 0.95); z-index: 2000; overflow-y: auto; padding: 20px;
        }
        .course-page {
            background: var(--white); max-width: 800px; margin: 40px auto; padding: 50px;
            border-radius: 25px; position: relative; box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .close-btn { position: sticky; top: 0; float: right; font-size: 2rem; cursor: pointer; color: var(--secondary); font-weight: bold; }
        .option-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: white; border: 2px solid #eee; border-radius: 10px; cursor: pointer; text-align: left; font-weight: 500; transition: 0.2s; }
        .correct { background: #dcfce7 !important; border-color: #22c55e !important; }
        .wrong { background: #fee2e2 !important; border-color: #ef4444 !important; }

        footer { text-align: center; padding: 40px; background: #eee; font-size: 0.9rem; color: #888; }
    </style>
</head>
<body>

    <header id="main-nav">
        <div class="nav-container">
            <div onclick="goHome()" style="cursor:pointer; font-weight: 800; letter-spacing: 1px;">⚙️ MACHINE À LANGUE</div>
            <nav>
                <a onclick="showSection('reception')">Réception</a>
                <a onclick="showSection('langue')">Langue</a>
                <a href="cours.html" class="nav-active-btn">⚡ PORTAIL COURS</a>
                <a onclick="showSection('oral')">Oral</a>
                <a onclick="showSection('ecrit')">Écrit</a>
            </nav>
        </div>
    </header>

    <section id="home">
        <div class="hero-content">
            <h1>Machine à Langue</h1>
            <p>Le portail complet de maîtrise du français par M. Mohamed EL Khoumssi.</p>
            
            <div class="hero-social-actions">
                <a href="https://facebook.com/100077095540021" target="_blank" class="hero-btn btn-fb">Suivre (91k)</a>
                <a href="cours.html" class="hero-btn btn-cours">📖 VOIR LES COURS</a>
                <a href="https://m.me/100077095540021" target="_blank" class="hero-btn btn-msg">Message</a>
            </div>
        </div>
        <div class="main-menu-grid" id="menuGrid"></div>
    </section>

    <main id="contentArea"></main>

    <div id="courseOverlay" class="course-overlay">
        <div class="course-page">
            <span class="close-btn" onclick="closeLesson()">&times;</span>
            <div id="lessonContent" class="lesson-body"></div>
        </div>
    </div>

    <footer>Machine à Langue &copy; 2026 - Outil pédagogique innovant par Mohamed EL Khoumssi.</footer>

    <script>
        // ... (Le reste de votre script JavaScript reste identique)
        const database = {
            reception: { title: "Réception de l'Écrit", icon: "📖", lessons: [
                { id: "r1", t: "Genres Littéraires", d: "Roman, Poésie, Théâtre.", long: "<h2>Le Roman</h2><p>Une narration longue en prose.</p>", q: "Lequel est écrit pour être joué ?", o: ["Le Roman", "Le Théâtre", "L'Essai"], a: 1 }
            ]},
            langue: { title: "Étude de la Langue", icon: "⚙️", lessons: [
                { id: "l1", t: "Registres de Langue", d: "Soutenu, Courant, Familier.", long: "<h2>Soutenu</h2><p>Langage châtié.</p>", q: "'C'est ouf' est...", o: ["Courant", "Familier"], a: 1 }
            ]},
            oral: { title: "Production de l'Oral", icon: "🎤", lessons: [
                { id: "o1", t: "L'Écoute Active", d: "Reformuler.", long: "<h2>Principe</h2><p>Valider la compréhension.</p>", q: "Utilité :", o: ["Gagner du temps", "Valider le message"], a: 1 }
            ]},
            ecrit: { title: "Production de l'Écrit", icon: "✍️", lessons: [
                { id: "e1", t: "Le Résumé", d: "Condenser le sens.", long: "<h2>Règles</h2><p>Propres mots.</p>", q: "Peut-on copier ?", o: ["Oui", "Non"], a: 1 }
            ]}
        };

        function init() {
            const menuGrid = document.getElementById('menuGrid');
            const contentArea = document.getElementById('contentArea');
            for (let key in database) {
                menuGrid.innerHTML += `<div class="menu-card" onclick="showSection('${key}')"><i>${database[key].icon}</i><h3>${database[key].title}</h3></div>`;
                let cardsHtml = database[key].lessons.map(l => `<div class="art-card" onclick="openLesson('${key}', '${l.id}')"><h3>${l.t}</h3><p>${l.d}</p></div>`).join('');
                contentArea.innerHTML += `<section id="${key}" class="content-section"><div class="container"><h2 onclick="goHome()" style="cursor:pointer; color:var(--secondary); font-size: 1rem;">← Retour</h2><h1 style="margin: 20px 0; color: var(--primary); font-size: 2.5rem;">${database[key].title}</h1><div class="art-grid">${cardsHtml}</div></div></section>`;
            }
        }

        function openLesson(cat, id) {
            const lesson = database[cat].lessons.find(l => l.id === id);
            const body = document.getElementById('lessonContent');
            body.innerHTML = `<h1>${lesson.t}</h1>${lesson.long}<div style="background:#f9f9f9; padding:20px; border-radius:15px; margin-top:20px;"><h3>🎯 Test Rapide</h3><p>${lesson.q}</p>${lesson.o.map((opt, i) => `<button class="option-btn" onclick="checkAnswer(this, ${i === lesson.a})">${opt}</button>`).join('')}</div>`;
            document.getElementById('courseOverlay').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function checkAnswer(btn, isCorrect) {
            btn.classList.add(isCorrect ? 'correct' : 'wrong');
            btn.innerHTML += isCorrect ? " ✅" : " ❌";
        }

        function closeLesson() { document.getElementById('courseOverlay').style.display = 'none'; document.body.style.overflow = 'auto'; }

        function showSection(id) {
            document.getElementById('home').style.display = 'none';
            document.getElementById('main-nav').style.display = 'block';
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        function goHome() {
            document.getElementById('home').style.display = 'flex';
            document.getElementById('main-nav').style.display = 'none';
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        }

        init();
    </script>
</body>
</html>
