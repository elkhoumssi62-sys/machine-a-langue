<!DOCTYPE html>
<html lang="fr">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6365668540055184"
     crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machine à Langue | Corpus Intégral</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a2a6c;
            --secondary: #b21f1f;
            --accent: #fdbb2d;
            --bg: #f4f7f6;
            --white: #ffffff;
            --text: #2c3e50;
            --fb-color: #1877F2;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; }

        /* HEADER & NAV */
        header {
            background: var(--primary); color: white; padding: 1rem 0;
            position: fixed; width: 100%; top: 0; z-index: 1000; display: none; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.2);
        }
        .nav-container { width: 90%; max-width: 1200px; margin: auto; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; text-decoration: none; margin-left: 20px; font-weight: 500; cursor: pointer; font-size: 0.85rem; text-transform: uppercase; }
        
        .nav-link-new { background: var(--secondary); padding: 5px 12px; border-radius: 4px; font-weight: 600; }

        /* HERO SECTION */
        #home {
            height: 100vh;
            background: linear-gradient(135deg, rgba(26, 42, 108, 0.9), rgba(178, 31, 31, 0.9)), 
                        url('https://images.unsplash.com/photo-1457369804613-52c61a468e7d?auto=format&fit=crop&w=1350&q=80');
            background-size: cover; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: white;
        }
        .hero-content h1 { font-size: 3.5rem; font-weight: 800; margin-bottom: 10px; letter-spacing: -1px; }
        .hero-content p { font-size: 1.2rem; opacity: 0.9; margin-bottom: 25px; }

        .hero-social-actions {
            display: flex; gap: 15px; margin-bottom: 35px; flex-wrap: wrap; justify-content: center;
        }
        .hero-btn {
            padding: 12px 28px; border-radius: 50px; text-decoration: none; 
            font-weight: 600; font-size: 0.95rem; transition: 0.3s; border: none; cursor: pointer;
        }
        .btn-fb { background: var(--fb-color); color: white; }
        .btn-msg { background: var(--white); color: var(--primary); }
        .btn-new-page { background: var(--accent); color: var(--primary); } 
        .hero-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }

        .main-menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; width: 90%; max-width: 1100px; }
        .menu-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; transition: 0.4s; }
        .menu-card:hover { background: var(--white); color: var(--primary); transform: translateY(-10px); }
        .menu-card i { font-size: 2.5rem; display: block; margin-bottom: 10px; }

        /* CONTENT SECTIONS */
        .content-section { display: none; padding: 120px 20px 60px; min-height: 100vh; }
        .active { display: block; }
        .container { max-width: 1000px; margin: auto; }
        .art-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        
        .art-card {
            background: white; padding: 25px; border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-top: 5px solid var(--secondary);
            cursor: pointer; transition: 0.3s; position: relative; overflow: hidden;
        }
        .art-card::after { content: 'Lire la leçon →'; position: absolute; bottom: 10px; right: 20px; font-size: 0.7rem; color: var(--secondary); font-weight: bold; opacity: 0.6; }
        .art-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .art-card h3 { color: var(--primary); font-size: 1.1rem; margin-bottom: 10px; }
        .art-card p { font-size: 0.85rem; color: #666; line-height: 1.5; }

        /* MODALE & VIDEO CONTAINER */
        .course-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 42, 108, 0.95); z-index: 2000; overflow-y: auto; padding: 20px;
        }
        .course-page {
            background: var(--white); max-width: 800px; margin: 40px auto; padding: 50px;
            border-radius: 25px; position: relative; box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .video-wrapper { position: relative; padding-top: 56.25%; width: 100%; margin-bottom: 25px; border-radius: 12px; overflow: hidden; background: #000; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .close-btn { position: sticky; top: 0; float: right; font-size: 2rem; cursor: pointer; color: var(--secondary); font-weight: bold; }
        
        .lesson-body h1 { color: var(--primary); font-size: 2.2rem; margin-bottom: 25px; border-bottom: 3px solid var(--accent); display: inline-block; }
        .lesson-body h2 { color: var(--secondary); margin: 25px 0 15px; font-size: 1.4rem; }
        .lesson-body p { margin-bottom: 15px; line-height: 1.8; font-size: 1.05rem; }

        /* QUIZ DESIGN */
        .quiz-container { background: #fdf2f2; padding: 30px; border-radius: 15px; margin-top: 40px; border: 1px solid #fee2e2; }
        .option-btn { 
            display: block; width: 100%; padding: 15px; margin: 10px 0; 
            background: white; border: 2px solid #eee; border-radius: 10px; 
            cursor: pointer; text-align: left; font-weight: 500; transition: 0.2s;
        }
        .option-btn:hover { border-color: var(--primary); background: #f0f4ff; }
        .correct { background: #dcfce7 !important; border-color: #22c55e !important; color: #166534; }
        .wrong { background: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b; }

        footer { text-align: center; padding: 40px; background: #eee; font-size: 0.9rem; color: #888; }
    </style>
</head>
<body>

    <header id="main-nav">
        <div class="nav-container">
            <div onclick="goHome()" style="cursor:pointer; font-weight: 800; letter-spacing: 1px;">⚙️ MACHINE À LANGUE</div>
            <nav>
                <a onclick="showSection('reception')">Réception</a>
                <a onclick="showSection('langue')">Langue</a>
                <a onclick="showSection('oral')">Oral</a>
                <a onclick="showSection('ecrit')">Écrit</a>
                <a href="cours.html" class="nav-link-new">Accéder aux Cours</a>
            </nav>
        </div>
    </header>

    <section id="home">
        <div class="hero-content">
            <h1>Machine à Langue</h1>
            <p>Le portail complet de maîtrise du français qualifiant.</p>
            
            <div class="hero-social-actions">
                <a href="https://facebook.com/100077095540021" target="_blank" class="hero-btn btn-fb">S'abonner (91k)</a>
                <a href="cours.html" class="hero-btn btn-new-page">📖 Découvrir les Cours</a>
                <a href="https://m.me/100077095540021" target="_blank" class="hero-btn btn-msg">Message Direct</a>
            </div>
        </div>
        <div class="main-menu-grid" id="menuGrid"></div>
    </section>

    <main id="contentArea"></main>

    <div id="courseOverlay" class="course-overlay">
        <div class="course-page">
            <span class="close-btn" onclick="closeLesson()">&times;</span>
            <div id="lessonContent" class="lesson-body"></div>
        </div>
    </div>

    <footer>Machine à Langue &copy; 2026 - Outil pédagogique innovant par Mohamed EL Khoumssi.</footer>

    <script>
        const database = {
            reception: { title: "Réception de l'Écrit", icon: "📖", lessons: [
                { id: "r1", t: "Genres Littéraires", d: "Roman, Poésie, Théâtre.", long: "<h2>Le Roman</h2><p>Une narration longue en prose (ex: <i>La Boîte à Merveilles</i>).</p><h2>Le Théâtre</h2><p>Conçu pour la scène, il vit par le dialogue.</p>", q: "Lequel est écrit pour être joué ?", o: ["Le Roman", "Le Théâtre", "L'Essai"], a: 1 },
                { id: "r2", t: "Types de Discours", d: "Narratif, descriptif, argumentatif.", long: "<h2>Narratif</h2><p>Raconte des actions.</p><h2>Descriptif</h2><p>Montre un lieu.</p>", q: "Un texte décrivant un paysage est...", o: ["Narratif", "Explicatif", "Descriptif"], a: 2 },
                { id: "r3", t: "Implicite & Explicite", d: "Lire entre les lignes.", long: "<h2>Explicite</h2><p>Direct.</p><h2>Implicite</h2><p>Sous-entendu.</p>", q: "'Il fait chaud' pour demander d'ouvrir la fenêtre est...", o: ["Implicite", "Explicite"], a: 0 },
                { id: "r4", t: "Énonciation", d: "Qui parle à qui ?", long: "<h2>Indices</h2><p>Je, Tu, Ici, Maintenant.</p>", q: "Le pronom 'Je' indique une énonciation...", o: ["Ancrée", "Coupée"], a: 0 },
                { id: "r5", t: "Registres Littéraires", d: "Tragique, Comique, Pathétique.", long: "<h2>Le Tragique</h2><p>Fatalité (Antigone).</p>", q: "Le registre qui inspire la pitié est le...", o: ["Tragique", "Pathétique"], a: 1 },
                { id: "r6", t: "Lecture d'Image", d: "Angles et couleurs.", long: "<h2>Angles</h2><p>Plongée et contre-plongée.</p>", q: "Vue d'en haut vers le bas :", o: ["Plongée", "Contre-plongée"], a: 0 },
                { id: "r7", t: "Le Paratexte", d: "Titre, auteur et contexte.", long: "<h2>Utilité</h2><p>Prépare l'attente du lecteur.</p>", q: "La couverture fait partie du...", o: ["Texte", "Paratexte"], a: 1 },
                { id: "r8", t: "Fiche de Lecture", d: "Synthétiser l'œuvre.", long: "<h2>Méthode</h2><p>Auteur, Genre, Thèmes, Résumé.</p>", q: "Une fiche de lecture doit être...", o: ["Longue", "Synthétique"], a: 1 },
                { id: "r9", t: "Visée Communicative", d: "Informer ou convaincre.", long: "<h2>Enjeux</h2><p>L'intention de l'auteur.</p>", q: "Un mode d'emploi est...", o: ["Informatif", "Prescriptif"], a: 1 },
                { id: "r10", t: "Focalisation", d: "Le point de vue narratif.", long: "<h2>Zéro</h2><p>Narrateur omniscient.</p>", q: "Celui qui sait tout :", o: ["Interne", "Zéro"], a: 1 }
            ]},
            langue: { title: "Étude de la Langue", icon: "⚙️", lessons: [
                { id: "l0", t: "Les Adjectifs", d: "Accords et fonctions.", fbId: "843694304796473", long: "<h2>L'adjectif qualificatif</h2><p>Il précise le sens du nom. Il peut être épithète ou attribut.</p>", q: "L'adjectif s'accorde-t-il avec le nom ?", o: ["Oui", "Non"], a: 0 },
                { id: "l1", t: "Registres de Langue", d: "Soutenu, Courant, Familier.", long: "<h2>Soutenu</h2><p>Langage châtié.</p>", q: "'C'est ouf' est...", o: ["Courant", "Familier"], a: 1 },
                { id: "l2", t: "Cohérence Textuelle", d: "Connecteurs logiques.", long: "<h2>Outils</h2><p>Mais, donc, car.</p>", q: "'Cependant' exprime...", o: ["La cause", "L'opposition"], a: 1 },
                { id: "l3", t: "Figures de Style", d: "Esthétique du discours.", long: "<h2>Comparaison</h2><p>Utilise 'comme'.</p>", q: "'Le soleil dort' est une...", o: ["Personnification", "Litote"], a: 0 },
                { id: "l4", t: "Modalisateurs", d: "Doute et certitude.", long: "<h2>Outils</h2><p>Peut-être, sans doute.</p>", q: "'Il est possible que' exprime...", o: ["Certitude", "Éventualité"], a: 1 },
                { id: "l5", t: "Valeurs des Temps", d: "Passé simple vs Imparfait.", long: "<h2>Imparfait</h2><p>Habitude, décor.</p>", q: "Action soudaine au passé :", o: ["Passé Simple", "Imparfait"], a: 0 },
                { id: "l6", t: "La Ponctuation", d: "Rythme et sens.", long: "<h2>Deux-points</h2><p>Explication.</p>", q: "Lequel introduit une citation ?", o: ["Virgule", "Deux-points"], a: 1 },
                { id: "l7", t: "Champ Lexical", d: "Réseaux de mots.", long: "<h2>Exemple</h2><p>Mer, sable = Océan.</p>", q: "Banc, tableau, craie :", o: ["Bureau", "École"], a: 1 },
                { id: "l8", t: "Nominalisation", d: "Style dense.", long: "<h2>Transformation</h2><p>'Il part' devient 'Son départ'.</p>", q: "Nominalisez 'Il a gagné' :", o: ["La gagne", "La victoire"], a: 1 },
                { id: "l9", t: "Discours Rapporté", d: "Direct et Indirect.", long: "<h2>Indirect</h2><p>Utilise 'que'.</p>", q: "Il dit : 'Je viens' devient :", o: ["Il dit qu'il vient", "Il dit je viens"], a: 0 },
                { id: "l10", t: "Causalité", d: "Cause et conséquence.", long: "<h2>Connecteurs</h2><p>Car, donc.</p>", q: "'Puisque' introduit une...", o: ["Cause", "Conséquence"], a: 0 }
            ]},
            oral: { title: "Production de l'Oral", icon: "🎤", lessons: [
                { id: "o1", t: "L'Écoute Active", d: "Reformuler.", long: "<h2>Principe</h2><p>Valider la compréhension.</p>", q: "Utilité :", o: ["Gagner du temps", "Valider le message"], a: 1 },
                { id: "o2", t: "Volume & Débit", d: "Gérer sa voix.", long: "<h2>Voix</h2><p>Articuler et poser des pauses.</p>", q: "Débit rapide = ", o: ["Assurance", "Stress"], a: 1 },
                { id: "o3", t: "Langage Corporel", d: "La posture.", long: "<h2>Posture</h2><p>Droit et ouvert.</p>", q: "Regardez :", o: ["Le sol", "Le public"], a: 1 },
                { id: "o4", t: "Exposé Structuré", d: "Introduction et corps.", long: "<h2>Accroche</h2><p>Capter l'attention.</p>", q: "L'accroche se place :", o: ["Au début", "À la fin"], a: 0 },
                { id: "o5", t: "Le Débat", d: "Confronter des idées.", long: "<h2>Règle</h2><p>Calme et arguments.</p>", q: "Dans un débat :", o: ["Crier", "Argumenter"], a: 1 },
                { id: "o6", t: "Argument Oratoire", d: "Convaincre.", long: "<h2>Piliers</h2><p>Éthos, Pathos, Logos.</p>", q: "L'émotion est le...", o: ["Ethos", "Pathos"], a: 1 },
                { id: "o7", t: "L'Interview", d: "Questions précises.", long: "<h2>Ouvertes</h2><p>Faire parler.</p>", q: "Question fermée = ", o: ["Oui/Non", "Long texte"], a: 0 },
                { id: "o8", t: "Lecture Expressive", d: "Mettre le ton.", long: "<h2>Ton</h2><p>Respecter la ponctuation.</p>", q: "Pause courte :", o: ["Point", "Virgule"], a: 1 },
                { id: "o9", t: "Compte Rendu Oral", d: "Synthèse.", long: "<h2>Objectif</h2><p>Être neutre.</p>", q: "Le compte rendu est...", o: ["Subjectif", "Objectif"], a: 1 },
                { id: "o10", t: "Improvisation", d: "Réagir vite.", long: "<h2>Technique</h2><p>Entraînement regulier.</p>", q: "L'improvisation demande :", o: ["Rien", "De l'exercice"], a: 1 }
            ]},
            ecrit: { title: "Production de l'Écrit", icon: "✍️", lessons: [
                { id: "e1", t: "Le Résumé", d: "Condenser le sens.", long: "<h2>Règles</h2><p>Propres mots, pas de citations.</p>", q: "Peut-on copier ?", o: ["Oui", "Non"], a: 1 },
                { id: "e2", t: "Plan de l'Essai", d: "Dialectique.", long: "<h2>Plan</h2><p>Thèse, Antithèse, Synthèse.</p>", q: "Oui/Non/Bilan est :", o: ["Analytique", "Dialectique"], a: 1 },
                { id: "e3", t: "Lettre Formelle", d: "Codes administratifs.", long: "<h2>Structure</h2><p>Objet, Formule de politesse.</p>", q: "L'objet se place :", o: ["Avant le texte", "À la fin"], a: 0 },
                { id: "e4", t: "Le CV", d: "Vendre son parcours.", long: "<h2>Rubriques</h2><p>Formation, Expériences.</p>", q: "Un CV doit être :", o: ["Long", "Aéré"], a: 1 },
                { id: "e5", t: "Le Pastiche", d: "Imiter un style.", long: "<h2>Méthode</h2><p>Reproduire les tics d'un auteur.</p>", q: "Le pastiche est :", o: ["Une critique", "Une imitation"], a: 1 },
                { id: "e6", t: "Écrit d'Invention", d: "Créativité.", long: "<h2>Consigne</h2><p>Respecter le genre imposé.</p>", q: "Faut-il garder le style ?", o: ["Oui", "Non"], a: 0 },
                { id: "e7", t: "La Synthèse", d: "Croiser les sources.", long: "<h2>Démarche</h2><p>Points communs entre documents.</p>", q: "Donne-t-on son avis ?", o: ["Oui", "Non"], a: 1 },
                { id: "e8", t: "Le Commentaire", d: "Fond et forme.", long: "<h2>Analyse</h2><p>Comment l'effet est produit.</p>", q: "On explique le...", o: ["Quoi", "Comment"], a: 1 },
                { id: "e9", t: "Connecteurs", d: "L'ossature logique.", long: "<h2>Variété</h2><p>En revanche, de surcroît.</p>", q: "'De surcroît' ajoute :", o: ["Opposition", "Addition"], a: 1 },
                { id: "e10", t: "Rédaction Critique", d: "Argumenter.", long: "<h2>Structure</h2><p>Position + 3 arguments.</p>", q: "Un argument doit être :", o: ["Vague", "Illustré"], a: 1 }
            ]}
        };

        function init() {
            const menuGrid = document.getElementById('menuGrid');
            const contentArea = document.getElementById('contentArea');
            for (let key in database) {
                menuGrid.innerHTML += `<div class="menu-card" onclick="showSection('${key}')"><i>${database[key].icon}</i><h3>${database[key].title}</h3></div>`;
                let cardsHtml = database[key].lessons.map(l => `<div class="art-card" onclick="openLesson('${key}', '${l.id}')"><h3>${l.t}</h3><p>${l.d}</p></div>`).join('');
                contentArea.innerHTML += `<section id="${key}" class="content-section"><div class="container"><h2 onclick="goHome()" style="cursor:pointer; color:var(--secondary); font-size: 1rem;">← Retour</h2><h1 style="margin: 20px 0; color: var(--primary); font-size: 2.5rem;">${database[key].title}</h1><div class="art-grid">${cardsHtml}</div></div></section>`;
            }
        }

        function openLesson(cat, id) {
            const lesson = database[cat].lessons.find(l => l.id === id);
            const body = document.getElementById('lessonContent');
            
            // Gestion de la vidéo Facebook si l'ID est présent
            let videoHtml = "";
            if (lesson.fbId) {
                videoHtml = `
                    <div class="video-wrapper">
                        <iframe 
                            src="https://www.facebook.com/plugins/video.php?href=https://www.facebook.com/facebook/videos/${lesson.fbId}/&show_text=0" 
                            scrolling="no" frameborder="0" allowfullscreen="true" 
                            allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share">
                        </iframe>
                    </div>`;
            }

            body.innerHTML = `<h1>${lesson.t}</h1>${videoHtml}${lesson.long}<div class="quiz-container"><h3>🎯 Test Rapide</h3><p>${lesson.q}</p>${lesson.o.map((opt, i) => `<button class="option-btn" onclick="checkAnswer(this, ${i === lesson.a})">${opt}</button>`).join('')}</div>`;
            document.getElementById('courseOverlay').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function checkAnswer(btn, isCorrect) {
            if(isCorrect) { btn.classList.add('correct'); btn.innerText += " ✅"; }
            else { btn.classList.add('wrong'); btn.innerText += " ❌"; }
        }

        function closeLesson() { document.getElementById('courseOverlay').style.display = 'none'; document.body.style.overflow = 'auto'; }

        function showSection(id) {
            document.getElementById('home').style.display = 'none';
            document.getElementById('main-nav').style.display = 'block';
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        function goHome() {
            document.getElementById('home').style.display = 'flex';
            document.getElementById('main-nav').style.display = 'none';
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        }

        init();
    </script>
</body>
</html>
