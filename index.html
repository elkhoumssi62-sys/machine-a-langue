        .btn-msg { background: var(--white); color: var(--primary); }
        .btn-new-page { background: var(--accent); color: var(--primary); }

        .art-card::after { content: 'Lire la leçon →'; position: absolute; bottom: 10px; right: 20px; font-size: 0.7rem; color: var(--secondary); font-weight: bold; opacity: 0.6; }
        .art-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .art-card h3 { color: var(--primary); font-size: 1.1rem; margin-bottom: 10px; }

        .course-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(26, 42, 108, 0.95); z-index: 2000; overflow-y: auto; padding: 20px; }

                { id: "r7", t: "Le Paratexte", d: "Titre, auteur.", fbId: "1106883277334757", long: "<h2>Autour du texte</h2><p>L'importance des éléments périphériques.</p>", q: "La couverture est du...", o: ["Texte", "Paratexte"], a: 1 },

                { id: "r10", t: "Focalisation", d: "Point de vue.", fbId: "1488109678486025", long: "<h2>Le regard</h2><p>Zéro, interne ou externe.</p>", q: "Celui qui sait tout :", o: ["Interne", "Zéro"], a: 1 }
            ]},
            langue: { title: "Étude de la Langue", icon: "⚙️", lessons: [
                { id: "l0", t: "Les Adjectifs", d: "Accords et fonctions.", fbId: "843694304796473", long: "<h2>L'adjectif</h2><p>Accords en genre et en nombre.</p>", q: "S'accorde-t-il ?", o: ["Oui", "Non"], a: 0 },
                { id: "l1", t: "Registres de Langue", d: "Soutenu, Familier.", fbId: "1157929425883656", long: "<h2>Niveaux de langue</h2><p>Adapter son langage au contexte.</p>", q: "'C'est ouf' est :", o: ["Courant", "Familier"], a: 1 },
                { id: "l2", t: "Cohérence Textuelle", d: "Connecteurs.", fbId: "1106883277334757", long: "<h2>La logique</h2><p>Lier les idées entre elles.</p>", q: "'Cependant' exprime :", o: ["La cause", "L'opposition"], a: 1 },

                { id: "l4", t: "Modalisateurs", d: "Doute.", fbId: "599573862707248", long: "<h2>Subjectivité</h2><p>L'expression de l'opinion personnelle.</p>", q: "'Possible que' exprime :", o: ["Certitude", "Éventualité"], a: 1 },
                { id: "l5", t: "Valeurs des Temps", d: "Passé simple.", fbId: "1488109678486025", long: "<h2>Le récit</h2><p>Différence entre premier plan et arrière-plan.</p>", q: "Action soudaine :", o: ["Passé Simple", "Imparfait"], a: 0 },
                { id: "l6", t: "La Ponctuation", d: "Rythme.", fbId: "843694304796473", long: "<h2>Les signes</h2><p>Donner du sens à la phrase.</p>", q: "Lequel introduit une citation ?", o: ["Virgule", "Deux-points"], a: 1 },
                { id: "l7", t: "Champ Lexical", d: "Réseaux de mots.", fbId: "1157929425883656", long: "<h2>Vocabulaire</h2><p>Groupe de mots liés à un thème.</p>", q: "Banc, tableau :", o: ["Bureau", "École"], a: 1 },
                { id: "l8", t: "Nominalisation", d: "Style dense.", fbId: "1106883277334757", long: "<h2>Grammaire</h2><p>Transformer un verbe en nom.</p>", q: "Nom de 'Gagner' :", o: ["La gagne", "La victoire"], a: 1 },
                { id: "l9", t: "Discours Rapporté", d: "Direct/Indirect.", fbId: "1165275061483863", long: "<h2>Rapporter des paroles</h2><p>Les changements de temps et de pronoms.</p>", q: "Il dit: 'Je viens' -> ", o: ["Il dit qu'il vient", "Il dit je vient"], a: 0 },
                { id: "l10", t: "Causalité", d: "Cause/Conséquence.", fbId: "1488109678486025", long: "<h2>Logique</h2><p>Exprimer l'origine et le résultat.</p>", q: "'Puisque' introduit une :", o: ["Cause", "Conséquence"], a: 0 }
            ]},
            oral: { title: "Production de l'Oral", icon: "🎤", lessons: [
                { id: "o1", t: "L'Écoute Active", d: "Reformuler.", fbId: "1157929425883656", long: "<h2>Communication</h2><p>Savoir écouter pour bien répondre.</p>", q: "Utilité :", o: ["Temps", "Valider le message"], a: 1 },
                { id: "o2", t: "Volume & Débit", d: "Voix.", fbId: "1106883277334757", long: "<h2>Élocution</h2><p>Gérer son stress par la voix.</p>", q: "Débit rapide = ", o: ["Assurance", "Stress"], a: 1 },
                { id: "o3", t: "Langage Corporel", d: "Posture.", fbId: "843694304796473", long: "<h2>Le corps parle</h2><p>L'importance du regard et des gestes.</p>", q: "Regardez :", o: ["Le sol", "Le public"], a: 1 },
                { id: "o4", t: "Exposé Structuré", d: "Plan.", fbId: "599573862707248", long: "<h2>Prise de parole</h2><p>Organiser ses idées devant un public.</p>", q: "L'accroche est au :", o: ["Début", "Fin"], a: 0 },
                { id: "o5", t: "Le Débat", d: "Idées.", fbId: "1165275061483863", long: "<h2>Argumentation</h2><p>Défendre son point de vue avec respect.</p>", q: "Dans un débat :", o: ["Crier", "Argumenter"], a: 1 },
                { id: "o6", t: "Argument Oratoire", d: "Convaincre.", fbId: "1488109678486025", long: "<h2>Rhétorique</h2><p>L'art de bien parler.</p>", q: "L'émotion est le :", o: ["Ethos", "Pathos"], a: 1 },
                { id: "o7", t: "L'Interview", d: "Questions.", fbId: "1157929425883656", long: "<h2>Échange</h2><p>Savoir poser les bonnes questions.</p>", q: "Question fermée = ", o: ["Oui/Non", "Texte"], a: 0 },
                { id: "o8", t: "Lecture Expressive", d: "Le ton.", fbId: "1106883277334757", long: "<h2>Interprétation</h2><p>Donner vie à un texte écrit.</p>", q: "Pause courte :", o: ["Point", "Virgule"], a: 1 },
                { id: "o9", t: "Compte Rendu Oral", d: "Synthèse.", fbId: "843694304796473", long: "<h2>Objectivité</h2><p>Résumer une situation oralement.</p>", q: "Il est :", o: ["Subjectif", "Objectif"], a: 1 },
                { id: "o10", t: "Improvisation", d: "Réagir.", fbId: "599573862707248", long: "<h2>Spontanéité</h2><p>Savoir parler sans notes.</p>", q: "Elle demande :", o: ["Rien", "De l'exercice"], a: 1 }
            ]},
            ecrit: { title: "Production de l'Écrit", icon: "✍️", lessons: [
                { id: "e1", t: "Le Résumé", d: "Condenser.", fbId: "1165275061483863", long: "<h2>Synthèse</h2><p>Réduire un texte sans perdre l'essentiel.</p>", q: "Copier ?", o: ["Oui", "Non"], a: 1 },
                { id: "e2", t: "Plan de l'Essai", d: "Dialectique.", fbId: "1488109678486025", long: "<h2>Organisation</h2><p>Thèse, antithèse, synthèse.</p>", q: "Oui/Non/Bilan :", o: ["Analytique", "Dialectique"], a: 1 },
                { id: "e3", t: "Lettre Formelle", d: "Codes.", fbId: "1157929425883656", long: "<h2>Administration</h2><p>Écrire une demande officielle.</p>", q: "L'objet est :", o: ["Avant", "Après"], a: 0 },
                { id: "e4", t: "Le CV", d: "Parcours.", fbId: "1106883277334757", long: "<h2>Insertion</h2><p>Présenter ses compétences.</p>", q: "Il doit être :", o: ["Long", "Aéré"], a: 1 },
                { id: "e5", t: "Le Pastiche", d: "Imiter.", fbId: "843694304796473", long: "<h2>Style</h2><p>Écrire 'à la manière de'.</p>", q: "C'est une :", o: ["Critique", "Imitation"], a: 1 },
                { id: "e6", t: "Écrit d'Invention", d: "Créativité.", fbId: "599573862707248", long: "<h2>Imaginaire</h2><p>Libérer sa plume sous contrainte.</p>", q: "Garder le style ?", o: ["Oui", "Non"], a: 0 },
                { id: "e7", t: "La Synthèse", d: "Sources.", fbId: "1165275061483863", long: "<h2>Confrontation</h2><p>Extraire des points communs de documents.</p>", q: "Donne-t-on son avis ?", o: ["Oui", "Non"], a: 1 },
                { id: "e8", t: "Le Commentaire", d: "Fond/Forme.", fbId: "1488109678486025", long: "<h2>Analyse fine</h2><p>Expliquer comment le texte fonctionne.</p>", q: "On explique le :", o: ["Quoi", "Comment"], a: 1 },
                { id: "e9", t: "Connecteurs", d: "Logique.", fbId: "1157929425883656", long: "<h2>Articulation</h2><p>L'ossature de votre rédaction.</p>", q: "'De surcroît' ajoute :", o: ["Opposition", "Addition"], a: 1 },
                { id: "e10", t: "Rédaction Critique", d: "Argumenter.", fbId: "1106883277334757", long: "<h2>Jugement</h2><p>Exprimer un avis étayé sur une œuvre.</p>", q: "Un argument est :", o: ["Vague", "Illustré"], a: 1 }
            ]}
        };
        function init() {
            const menuGrid = document.getElementById('menuGrid');
            const contentArea = document.getElementById('contentArea');
            for (let key in database) {
                menuGrid.innerHTML += `<div class="menu-card" onclick="showSection('${key}')"><i>${database[key].icon}</i><h3>${database[key].title}</h3></div>`;
                let cardsHtml = database[key].lessons.map(l => `<div class="art-card" onclick="openLesson('${key}', '${l.id}')"><h3>${l.t}</h3><p>${l.d}</p></div>`).join('');
                contentArea.innerHTML += `<section id="${key}" class="content-section"><div class="container"><h2 onclick="goHome()" style="cursor:pointer; color:var(--secondary); font-size: 1rem;">← Retour</h2><h1 style="margin: 20px 0; color: var(--primary); font-size: 2.5rem;">${database[key].title}</h1><div class="art-grid">${cardsHtml}</div></div></section>`;
            }
        }

        function openLesson(cat, id) {
            const lesson = database[cat].lessons.find(l => l.id === id);
            const body = document.getElementById('lessonContent');
            let videoHtml = "";
            if (lesson.fbId) {
                videoHtml = `<div class="video-wrapper"><iframe src="https://www.facebook.com/plugins/video.php?href=https://www.facebook.com/facebook/videos/${lesson.fbId}/&show_text=0" scrolling="no" frameborder="0" allowfullscreen="true" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share"></iframe></div>`;
            }
            body.innerHTML = `<h1>${lesson.t}</h1>${videoHtml}${lesson.long}<div class="quiz-container"><h3>🎯 Test Rapide</h3><p>${lesson.q}</p>${lesson.o.map((opt, i) => `<button class="option-btn" onclick="checkAnswer(this, ${i === lesson.a})">${opt}</button>`).join('')}</div>`;
            document.getElementById('courseOverlay').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function checkAnswer(btn, isCorrect) {
            if(isCorrect) { btn.classList.add('correct'); btn.innerText += " ✅"; }
            else { btn.classList.add('wrong'); btn.innerText += " ❌"; }
        }

        function closeLesson() { document.getElementById('courseOverlay').style.display = 'none'; document.body.style.overflow = 'auto'; }

        function showSection(id) {
            document.getElementById('home').style.display = 'none';
            document.getElementById('main-nav').style.display = 'block';
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        function goHome() {
            document.getElementById('home').style.display = 'flex';
            document.getElementById('main-nav').style.display = 'none';
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        }

        init();
    </script>
</body>
</html>
